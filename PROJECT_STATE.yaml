  - id: BMDL-002
    severity: high
    status: resolved
    text: Attempt 1 was confounded by a changed evidence ledger; results were invalidated and a hash-locked rerun was specified.
  - id: DESIGN-001
    severity: high
    status: resolved
    text: Complete at least two adversarial rounds for all five admitted concepts and a third round for the top two.
  - id: DESIGN-D1-R1
    severity: high
    status: resolved
    text: D1 requires a frozen receptor structure and design-level closure of five water/selectivity/dynamic/engineering/regeneration issues.
  - id: DESIGN-D2-R1
    severity: high
    status: resolved
    text: D2 requires a chemically defined local gate and must not treat bound-state A2062 heterogeneity as proven target-induced gating.
  - id: DESIGN-D3-R1
    severity: critical
    status: resolved
    text: D3 lacks PFOA-specific biological dynamic evidence and must first pass the two-site and chain-length static gates.
  - id: DESIGN-D4-R1
    severity: critical
    status: resolved
    text: D4 lacks experimental NrtA apo/bound dynamic evidence; full concept rejected pending a new prototype or direct evidence.
  - id: DESIGN-D5-R1
    severity: critical
    status: resolved
    text: D5 salt-responsive shell is not a SERT dynamic hard correspondence; current architecture rejected.
  - id: DESIGN-D1B-R3
    severity: high
    status: resolved
    text: Design and independently review the oriented PBP/PiBP biohybrid as a mechanism-preserving backup with explicit capacity, regeneration, stability and leakage gates.
  - id: FINAL-001
    severity: high
    status: resolved
    text: Complete the final Chinese report, attachment index, state synchronization, credential scan and fresh-clone continuity validation.
  - id: SCOPE-001
    severity: high
    status: resolved
    text: Rebuild the pollutant funnel around organic and emerging contaminants using pollutant_kb as a candidate source; apply independently verified secondary-effluent relevance and environmental significance as pass/fail gates before any weighted scoring, and include 2,6-dichlorophenol in the priority verification group.
  - id: SCHEME-001
    severity: high
    status: open
    text: Pan Yao must review the ten-scheme portfolio and approve or revise the recommended top five before isolated deep-design rounds begin.
  - id: APPROVAL-001
    severity: high
    status: deferred
    text: Final approval is deferred until the reopened pollutant screening and all downstream design stages are completed again.
