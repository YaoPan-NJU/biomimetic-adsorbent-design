open_issues:
  - id: INIT-001
    severity: high
    status: resolved
    text: BMDL snapshot exported with both default and transaction read-only set to on; structural audit completed.
  - id: INIT-002
    severity: high
    status: resolved
    text: Establish the evidence-backed ten-pollutant shortlist for secondary effluent.
  - id: BMDL-001
    severity: high
    status: resolved
    text: Complete paired blind evaluation before allowing BMDL into any creative design stage.
  - id: BMDL-002
    severity: high
    status: resolved
    text: Attempt 1 was confounded by a changed evidence ledger; results were invalidated and a hash-locked rerun was specified.
  - id: DESIGN-001
    severity: high
    status: resolved
    text: Complete at least two adversarial rounds for all five admitted concepts and a third round for the top two.
  - id: DESIGN-D1-R1
    severity: high
    status: resolved
    text: D1 requires a frozen receptor structure and design-level closure of five water/selectivity/dynamic/engineering/regeneration issues.
  - id: DESIGN-D2-R1
    severity: high
    status: resolved
    text: D2 requires a chemically defined local gate and must not treat bound-state A2062 heterogeneity as proven target-induced gating.
  - id: DESIGN-D3-R1
    severity: critical
    status: resolved
    text: D3 lacks PFOA-specific biological dynamic evidence and must first pass the two-site and chain-length static gates.
  - id: DESIGN-D4-R1
    severity: critical
    status: resolved
    text: D4 lacks experimental NrtA apo/bound dynamic evidence; full concept rejected pending a new prototype or direct evidence.
  - id: DESIGN-D5-R1
    severity: critical
    status: resolved
    text: D5 salt-responsive shell is not a SERT dynamic hard correspondence; current architecture rejected.
  - id: DESIGN-D1B-R3
    severity: high
    status: resolved
    text: Design and independently review the oriented PBP/PiBP biohybrid as a mechanism-preserving backup with explicit capacity, regeneration, stability and leakage gates.
  - id: FINAL-001
    severity: high
    status: resolved
    text: Complete the final Chinese report, attachment index, state synchronization, credential scan and fresh-clone continuity validation.
  - id: SCOPE-001
    severity: high
    status: resolved
    text: Rebuild the pollutant funnel around organic and emerging contaminants using pollutant_kb as a candidate source; apply independently verified secondary-effluent relevance and environmental significance as pass/fail gates before any weighted scoring, and include 2,6-dichlorophenol in the priority verification group.
  - id: SCHEME-001
    severity: high
    status: resolved
    text: Pan Yao must review the ten-scheme portfolio and approve or revise the recommended top five before isolated deep-design rounds begin.
  - id: TOP5-R1-001
    severity: high
    status: resolved_with_execution_deviation
    text: Complete isolated round-1 designer, attacker, and reviewer outputs for all five approved schemes; BMDL remains excluded from design and historical phosphate files remain immutable audit artifacts.
  - id: TOP5-R1-002
    severity: high
    status: resolved
    text: Isolated designer and attacker agents did not return artifacts within the bounded run; main-agent fallbacks are explicit in round-1 files, so round 2 must restore independent role review before any pass decision.
  - id: TOP5-R2-001
    severity: high
    status: resolved
    text: Resolve or terminate the target-specific dynamic hard-correspondence gaps for S1, S3, S4, S5 and S6 without using generic responsive materials as evidence substitutes.
  - id: TOP5-R3-001
    severity: critical
    status: resolved
    text: S1 completed a third isolated design, attack and review; it terminated at 56/100 with three critical and four high issues, so no top-five finalist remained.
  - id: REOPEN-001
    severity: high
    status: resolved
    text: Reopen library-external biological prototypes after no finalist; only the peer-reviewed PFOA-FABP4 direct structure route was admitted as S11, while PPARgamma, PFOS-FadL and roxithromycin-ribosome routes were bounded or rejected.
  - id: S11-G1A
    severity: high
    status: resolved
    text: Correct S11 sequence and numbering, replace the invalid bifunctional-amine surface route, freeze constructs, methods, models, causal endpoint and statistics, and obtain independent Gate 1a review; passed with zero design-layer critical/high issues.
  - id: S11-G1B
    severity: high
    status: scope_superseded
    text: Procurement/manufacturing release requires a plasmid map, supplier-returned FASTA, masses, primers, reagent identities/lots, reaction equivalents and batch templates; no ordering or experiment is authorized before this gate passes.
  - id: S11-G2
    severity: critical
    status: scope_superseded
    text: Experimental closure is still required for soluble dual occupancy, Phe58 residue-level dynamic causality, independent active-site normalization, immobilized accessibility and secondary-effluent competitive selectivity; current count is three critical and four high.
  - id: DIRECTION-001
    severity: critical
    status: resolved
    text: The mandatory dynamic-correspondence rule caused the design to drift from artificial material translation into folded-peptide and protein replication; the rule now requires one artificial-material functional correspondence and makes dynamics optional.
  - id: S1-SYN-001
    severity: high
    status: paused_by_portfolio_reopen
    text: Freeze one exact nonpeptidic guanidinium-amide and finite low-polar-chain receptor, matched deletion/mismatch controls, a material-class-neutral carrier or self-supporting architecture comparison, and a complete SOP for the selected route before any order or experiment.
  - id: CARRIER-001
    severity: high
    status: in_progress
    text: Prevent inactive carrier mass from being hidden by receptor-normalized capacity; compare total-dry-composite mg/g, packed-bed mg/mL, accessible-site density, site utilization and blank-carrier uptake without requiring silica, resin, carbon or any other material class.
  - id: PORTFOLIO-20-001
    severity: high
    status: superseded_by_owner_dynamic_allocation
    text: Pan Yao authorized continued work and dynamic allocation by success potential; BPA-1 advanced first and is now experiment-gated so BPA-2 receives the next paper-design allocation while no candidate is a finalist.
  - id: BPA1-S0-001
    severity: high
    status: superseded_by_directional_geometry_failure
    text: R1-BPE was rejected as the complete receptor because its divergent acceptors do not establish a convergent BPA pocket; retain it only as a possible negative control.
  - id: BPA1-R2-001
    severity: critical
    status: superseded_by_asymmetric_primary_anchor_translation
    text: The symmetric two-ended convergent receptor requirement was withdrawn after ERRgamma mutagenesis and the single-hydroxyl strong-binding analog showed that the primary anchor is asymmetric.
  - id: BPA1-P1-001
    severity: high
    status: experiment_gated_no_materialization
    text: P1-MAPy remains a high-information probe with frozen controls but the central phenol two-contact geometry is unproven and direct aqueous precedent shows general phenol uptake; no paper materialization before experimental pass.
  - id: BPA2-S0-001
    severity: high
    status: resolved_by_split
    text: Beta-CD has a 1:1 BPA aqueous baseline and a 201.14 mg/g pure-site ceiling; random polar-comonomer proximity is rejected. BPA-2E continues only as an engineering baseline while BPA-2R requires an exact secondary-rim receptor before materialization.
  - id: BPA2-E-001
    severity: high
    status: control_only
    text: Mature self-supporting high-betaCD networks already provide rapid BPA uptake regeneration matrix-tolerance and real-wastewater precedents; BPA-2E is retained as a positive engineering baseline rather than spending a design round on crosslinker optimization.
  - id: PFBS1-S0-001
    severity: high
    status: control_only
    text: The exact styrenyl-betaCD cationic-methacrylate porous platform was published in 2022 and PFBS removal fell from about 94 to 38 percent in 1 mM sulfate while PFOS retained about 79 percent; retain as a strong positive control only.
  - id: PFBS2-S0-001
    severity: high
    status: experiment_gated_no_exact_receptor
    text: No exact low-mass nonfluorinated C4-selective PFBS receptor was found; guanidinium and urea motifs have strong sulfate and phosphate competition and no demonstrated nonmonotonic PFBS preference, so no materialization is allowed.
  - id: ROX2-S0-001
    severity: high
    status: terminated
    text: ROX-2 lacks a ROX-specific ribosomal geometry and exact artificial slit; independent review scored 40 and terminated the ROX-specific candidate while retaining only a macrolide-class nonimprinted pore control.
  - id: BPA5-S0-001
    severity: critical
    status: terminated
    text: BPA-5 has no retrieved exact bifunctional calix4 receptor that passes the aqueous analog gate; the two-ended ERRgamma necessity claim is unsupported and direct polycalix4 BPA water prior art exists; independent review scored 40.
  - id: DCP1-S0-001
    severity: high
    status: paused_by_portfolio_100_reassessment
    text: Before any POP design determine whether aqueous halogen bonding or halogen-affinity geometry can distinguish 2,6-DCP from positional isomers and hydrophobicity pKa controls and independently confirm the secondary-effluent environmental gate.
  - id: TERM-001
    severity: high
    status: resolved
    text: User-facing terminology now separates biological prototypes from artificial recognition units; unqualified receptor wording for synthetic elements is prohibited and protein or peptide components remain outside default material scope.
  - id: BRANCH-INTEGRATION-001
    severity: high
    status: resolved
    text: Reviewed origin/GLM and origin/worktree-framework-correction; imported the 100-scheme records as a hypothesis archive and integrated only framework elements consistent with the current one-hard-correspondence dynamic-optional nonprotein contract.
  - id: PORTFOLIO100-REASSESS-001
    severity: high
    status: deferred_by_owner_priority
    text: Full per-scheme reclassification of the branch-imported archive is deferred because Pan Yao prioritized revalidation of the original designs; branch scores remain nonauthoritative and cannot displace main decisions.
  - id: ORIGINAL-REVALIDATION-001
    severity: high
    status: resolved_by_adaptive_replan
    text: Strict review found no original scheme passing all three gates; the fixed shortlist was replaced by adaptive discovery and the three prior leads remain pressure tests only.
  - id: ADAPTIVE-DISCOVERY-001
    severity: high
    status: in_progress_ROX_first_tournament_complete
    text: The first target-specific open discovery tournament is complete for ROX; no design was released at E1 and adaptive discovery continues under the same three non-compensable gates.
  - id: ROX-OPEN-001
    severity: high
    status: resolved
    text: Broaden ROX discovery beyond the biofilm-plus-imprint mapping and compare real biological accumulation partition transport and sequestration prototypes with nonprotein artificial routes.
  - id: ROX-BF1-E1-001
    severity: critical
    status: superseded_by_MAC_BI1_class_adsorption_replan
    text: The attacked ROX-specific biofilm-plus-imprint draft remains historical; its pSBMA gradient and isotope-template implementation are not inherited by MAC-BI1.
  - id: ROX-LYS-MIM-SCOPE-001
    severity: high
    status: resolved_out_of_scope
    text: Pan Yao requires a solid adsorbent; selective-permeation membrane and liquid receiver processes are excluded from the current route.
  - id: ROX-CLASS-SCOPE-001
    severity: high
    status: resolved
    text: Macrolide-class removal is acceptable; ROX-versus-ERY-CLA-AZI discrimination is a bonus, while preference over DOM salts and unrelated micropollutants remains mandatory.
  - id: MAC-BI1-FORMULATION-001
    severity: critical
    status: in_progress_commercial_prescreen_protocol_required
    text: First freeze and run the commercial-material class-preference prescreen; only then screen MAn-St-DVB bead yield particle size wet strength accessible carboxyl sites pore structure solvent recovery and matched causal controls.
  - id: GLM-LESSONS-002
    severity: high
    status: resolved_selective_integration
    text: Reviewed every GLM branch commit and full divergence through 9d4ad9a; integrated engineering-first discovery, one-plus-one prototype discipline, engineering material screening, verified local constraints, material-family prior-art attack and class-level selectivity, while rejecting stale PFOA state, categorical material claims and obsolete multi-hard-correspondence rules.
  - id: APPROVAL-001
    severity: high
    status: deferred
    text: Final approval is deferred until the reopened pollutant screening and all downstream design stages are completed again.
