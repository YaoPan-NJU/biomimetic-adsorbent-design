project:
  name: biomimetic-adsorbent-design
  owner: Pan Yao
  executor: Codex
  experimental_handoff: Zhou Jiaqi
  independence: ADRMATS is out of scope and is not a dependency

deliverable:
  language: zh-CN
  design_count_policy: all_designs_that_pass_three_owner_gates
  primary_backup_labels_required: false
  minimum_formal_release_level: E1_mechanism_validation_ready
  includes:
    - scientific causal chain
    - biomimetic correspondence matrix
    - material architecture and selective mechanism
    - bench-scale synthesis SOP
    - characterization and causal controls
    - adsorption, selectivity, matrix, regeneration, leaching, and stability experiments
    - success and failure criteria
    - evidence ledger and adversarial audit trail
  excludes:
    - actual laboratory execution
    - experimental results
    - full English manuscript
    - user-facing CLI or agent product

water_context:
  primary: municipal wastewater treatment secondary effluent
  mechanism_control: ultrapure water
  optional_external_validation:
    - surface water
    - drinking water

pollutant_admission:
  scope: organic_pollutants_with_priority_for_emerging_contaminants
  seed_source: pollutant_kb.pollutant_index
  seed_source_role: candidate_discovery_not_risk_authority
  hard_gates:
    - organic_pollutant
    - independently_verified_secondary_effluent_relevance
    - independently_verified_environmental_or_health_concern
    - meaningful_selective_adsorption_problem
    - falsifiable_biomimetic_design_opportunity
  priority_verification_group:
    - PFOA
    - PFBS
    - roxithromycin
    - bisphenol A
    - 2,6-dichlorophenol
  prohibited_shortcuts:
    - rank_by_paper_count_or_knowledge_item_count
    - treat_database_text_as_independently_verified_risk_evidence
    - admit_nutrients_or_inorganic_pollutants_without_explicit_scope_reopening

funnel:
  mode: adaptive_no_fixed_quota
  source_pollutant_count: open
  scheme_portfolio_count: open
  recommended_design_count: all_three_gate_passers
  delivery: rolling_do_not_wait_for_batch_completion
  primary_backup_assignment: owner_optional_after_review
  prohibited_behavior:
    - retain_weak_schemes_to_fill_a_quota
    - lower_a_gate_because_no_scheme_has_passed
    - delay_a_ready_design_until_a_fixed_batch_is_full

discovery_strategy:
  primary_spine: unsolved_secondary_effluent_engineering_problem
  mechanism_method: retrieve_real_biological_processes_that_address_the_frozen_problem
  pollutant_role: environmental_boundary_competitor_definition_and_validation_case
  prohibited_shortcut: assume_nature_has_a_pollutant_specific_prototype
  prototype_budget:
    preferred_primary: 1
    maximum_supporting_without_scope_review: 1
    supporting_requires_distinct_necessary_testable_function: true
  wastewater_bioprocess_discovery:
    eligible_systems:
      - activated_sludge
      - wastewater_biofilm
      - aerobic_granular_sludge
      - anaerobic_sludge
      - other_wastewater_biological_multiphase_systems
    candidate_observations:
      - sludge_water_partitioning
      - rapid_initial_sorption
      - desorption_hysteresis
      - biomass_or_EPS_enrichment
      - differential_behavior_across_sludge_structures
    evidence_ladder:
      WW_0: overall_removal_or_sludge_detection_discovery_signal_only
      WW_1: mass_balance_and_inhibited_or_inactivated_control_support_process_hypothesis
      WW_2: EPS_removal_readdition_fractionation_enzymatic_or_surface_perturbation_localizes_function
      WW_3: repeatable_causal_perturbation_with_alternative_explanations_excluded_supports_hard_correspondence
    required_alternative_explanations:
      - biodegradation_or_cometabolism
      - volatilization_or_photolysis
      - precipitation_or_inorganic_solid_association
      - colloid_entrapment
      - cellular_uptake
      - sampling_filtration_and_analytical_loss
    EPS_extraction_artifact_checks:
      - cell_lysis_and_intracellular_release
      - floc_disruption
      - changed_ionic_bridging
      - extraction_mass_recovery
    translation_rule: identify_and_translate_the_functional_organization_not_raw_EPS_as_default_material

pollutant_scoring:
  applies_only_after_all_admission_gates_pass: true
  environmental_significance_is_weighted: false
  selective_challenge: 25
  uniquely_biomimetic_capability: 25
  mechanism_to_material_translatability: 20
  engineering_generality: 15
  novelty_and_evidence_opportunity: 15

final_scoring:
  applies_only_after_three_owner_gates_pass: true
  ranking_only: true
  cannot_compensate_for_failed_gate: true
  causal_closure: 20
  selective_adsorption_mechanism: 25
  artificial_material_translatability: 20
  originality: 15
  experimental_falsifiability_and_controls: 10
  evidence_integrity: 10
  unresolved_critical_allowed: 0
  unresolved_high_allowed: 0

owner_hard_gates:
  biomimetic_story:
    required: true
    preferred_evidence: observed_biological_adsorption_accumulation_sequestration_barrier_partition_or_selective_transport
    analogous_natural_function_allowed: true
    pollutant_target_protein_binding_alone_is_sufficient: false
  material_and_experimental_science:
    required: true
    exact_nonprotein_material_entity: true
    matched_deletion_mismatch_and_conventional_controls: true
    aqueous_selectivity_and_prior_art_attack: true
    class_level_selectivity_allowed: true
    within_class_selectivity_required: false
    class_selectivity_requirement: preferential_removal_over_DOM_salts_and_unrelated_micropollutants
    selectivity_scope_must_be_frozen_per_design: true
    selectivity_scopes:
      single_compound:
        use_when: treatment_or_paper_claim_requires_within_class_discrimination
        within_class_competitor_discrimination_required: true
      pollutant_class:
        use_when: class_members_are_environmentally_relevant_and_should_be_jointly_removed
        within_class_competitor_discrimination_required: false
        required_external_preference: target_class_over_DOM_salts_and_unrelated_micropollutants
      broad_micropollutant_enrichment:
        use_when: multiple_unrelated_organic_micropollutant_classes_are_joint_targets
        prohibited_claim: class_specific_recognition
  engineering_validation:
    required: true
    minimum_release_level: E1
    E2_requires_full_secondary_effluent_column_regeneration_leaching_stability_package: true

hard_correspondence:
  required_static: 1
  required_dynamic: 0
  dynamic_is_optional_and_must_add_selective_function: true
  required_fields:
    - biological_feature
    - source_support
    - material_realization
    - expected_function
    - measurement
    - causal_control

biomimetic_classification:
  required_for_every_concept: true
  classes:
    functional_biomimicry: biological_system_solves_an_analogous_natural_function_with_direct_evidence
    biological_mechanism_informed: direct_biological_binding_or_structure_constrains_design_but_is_not_a_natural_pollution_solution
    rational_chemical_design: no_supported_biological_hard_correspondence
  rational_design_cannot_be_retrofitted_with_generic_protein_analogy: true
  engineering_problem_statement_precedes_prototype_retrieval: true
  minimum_hard_correspondences: 1
  second_hard_correspondence_is_bonus_not_gate: true
  dynamic_correspondence_remains_optional: true
  B_class_alone_cannot_enter_formal_recommendation: true

material_translation:
  default_material_class: synthetic_nonbiological_adsorbent
  current_product_form: recoverable_solid_particle_or_packed_bed_adsorbent
  excluded_current_product_forms:
    - membrane_separation
    - liquid_receiver_process
  affordability_and_scale:
    prohibit_default_components:
      - antibody
      - protein
      - peptide
      - expensive_two_dimensional_material
      - precious_metal
      - custom_multistep_host
    preferred_operations:
      - simple_suspension_polymerization
      - bead_formation
      - one_step_surface_reaction
      - simple_hydrolysis
      - furnace_pyrolysis_or_activation
    added_step_requires_measurable_gain: true
    comparison_basis:
      - finished_material_cost_per_kg
      - material_regeneration_and_waste_cost_per_m3_treated_water
    arbitrary_material_price_threshold_is_sufficient: false
  platform_screening:
    porous_carbon_role: high_priority_low_cost_platform_or_mandatory_engineering_benchmark
    porous_polymer_role: eligible_when_covalent_placement_bead_form_or_functional_colocalization_is_necessary
    advanced_framework_rule: MIP_COF_PAF_MOF_require_case_specific_cost_water_stability_leaching_shaping_and_regeneration_gate
    carrier_class_remains_not_preselected: true
  local_geometric_constraint_gate:
    allowed_sources:
      - rigid_covalent_topology
      - cyclization_or_preorganized_scaffold
      - defined_coordination_geometry
      - verified_multisite_non_covalent_array
    required_checks:
      - aqueous_speciation_at_target_pH
      - salt_DOM_and_competing_ligand_stability
      - wet_state_accessibility
      - deletion_position_mismatch_and_random_controls
      - component_leaching_and_cycle_stability
      - direct_structural_measurement
    generic_bond_geometry_alone_is_sufficient: false
  terminology_policy:
    biological_evidence_source: biological_prototype_or_exact_biological_category
    synthetic_recognition_term_zh: 人工识别单元
    unvalidated_synthetic_term_zh: 候选人工识别单元
    validated_synthetic_term_zh: 已验证人工识别单元
    prohibit_unqualified_receptor_for_synthetic_elements: true
    historical_artifacts_are_not_bulk_rewritten: true
  carrier_class: not_preselected
  carrier_mass_efficiency:
    principle: minimize_inactive_mass_without_sacrificing_selectivity_or_operability
    eligible_examples:
      - activated_or_engineered_porous_carbon
      - porous_polymer
      - inorganic_porous_support
      - self_supporting_porous_adsorbent
    no_example_is_mandatory: true
    required_reporting_basis:
      - mg_target_per_g_total_dry_composite
      - mg_target_per_mL_packed_bed
      - mmol_accessible_sites_per_g_total_dry_composite
      - receptor_mass_fraction_and_site_utilization
      - blank_carrier_uptake_under_matching_conditions
    rejection_rule: reject_if_inactive_mass_penalty_is_not_compensated_by_selectivity_matrix_tolerance_regeneration_stability_or_bed_performance
  biological_source_role: prototype_discovery_and_mechanism_evidence
  organ_enrichment_role: discovery_signal_not_causal_proof
  organ_enrichment_heuristic:
    status: optional_non_scoring_reference
    purpose: discover_candidate_binding_partitioning_or_transport_mechanisms
    required_before_material_translation:
      - reproducible_tissue_or_organ_enrichment
      - toxicokinetic_and_nonspecific_partitioning_alternatives_considered
      - direct_molecular_or_microenvironment_mechanism_evidence
    active_route_or_next_action_unchanged: true
  protein_peptide_or_biohybrid_requires_explicit_owner_scope_reopening: true
  prohibited_shortcuts:
    - introduce_protein_or_folded_peptide_only_to_satisfy_dynamic_correspondence
    - copy_protein_architecture_without_a_manufacturing_or_selectivity_necessity
    - infer_responsible_protein_from_tissue_enrichment_alone
    - treat_capacity_gain_as_selectivity_or_biomimetic_causality
    - preselect_carrier_only_for_coupling_convenience
    - report_capacity_only_per_receptor_or_active_fraction
    - ignore_inert_carrier_mass_in_gravimetric_comparisons

bmdl_gate:
  baseline_must_be_frozen_first: true
  design_assist:
    minimum_pairwise_wins: 6
    minimum_mean_gain: 5
    maximum_originality_drop: 2
    maximum_severe_misleading_links: 1
  exclude_from_design:
    diversity_ratio_below: 0.80
    severe_misleading_links_at_least: 2

adversarial_process:
  isolated_roles: true
  round_policy: adaptive_until_pass_or_terminate
  minimum_attack_and_review_cycles_before_release: 1
  additional_cycle_trigger: any_resolvable_critical_or_high_issue
  no_fixed_top_two_or_finalist_count: true
  persist_hidden_reasoning: false

rox_mac_if1_rescue:
  status: conditional_lead_B0_M0_not_passed_E1_not_ready
  owner_authorized_directional_redesign: true
  target_scope: macrolide_class_joint_removal
  primary_biological_observation: mature_inactivated_wastewater_biofilm_joint_CLA_ERY_ROX_partition
  supporting_biophysical_mechanism: shallow_macrolide_partition_at_anionic_lipid_interfaces
  causal_link_between_observation_and_mechanism_is_already_proven: false
  artificial_spatial_rule: low_coverage_weak_anionic_shallow_zone_adjacent_to_exposed_low_polarity_pore_wall
  primary_manufacturing_hypothesis: short_time_benzophenone_UV_AA_photograft_on_mm_porous_St_DVB
  baseline_retention:
    uniform_MAC_BI1_deleted: false
    role: uniform_mixed_mode_causal_control
  required_pre_E1_gates:
    B0: biological_interface_class_boundary_against_matched_cationic_amphiphiles
    M0: same_batch_shallow_deep_uniform_spatial_manufacture_and_characterization
    C0: spatial_causal_gain_over_composition_pore_and_commercial_controls
  prohibited_claims_before_gate_pass:
    - biofilm_EPS_or_lipid_component_is_already_causally_localized
    - ROX_atomic_interfacial_orientation_is_known
    - carboxylate_plus_hydrophobicity_is_macrolide_specific
    - surface_carboxylated_or_core_shell_beads_are_novel_by_themselves
    - MAC_IF1_is_E1_ready
