project:
  name: biomimetic-adsorbent-design
  owner: Pan Yao
  executor: Codex
  experimental_handoff: Zhou Jiaqi
  independence: ADRMATS is out of scope and is not a dependency

deliverable:
  language: zh-CN
  primary_designs: 1
  backup_designs: 1
  includes:
    - scientific causal chain
    - biomimetic correspondence matrix
    - material architecture and selective mechanism
    - bench-scale synthesis SOP
    - characterization and causal controls
    - adsorption, selectivity, matrix, regeneration, leaching, and stability experiments
    - success and failure criteria
    - evidence ledger and adversarial audit trail
  excludes:
    - actual laboratory execution
    - experimental results
    - full English manuscript
    - user-facing CLI or agent product

water_context:
  primary: municipal wastewater treatment secondary effluent
  mechanism_control: ultrapure water
  optional_external_validation:
    - surface water
    - drinking water

pollutant_admission:
  scope: organic_pollutants_with_priority_for_emerging_contaminants
  seed_source: pollutant_kb.pollutant_index
  seed_source_role: candidate_discovery_not_risk_authority
  hard_gates:
    - organic_pollutant
    - independently_verified_secondary_effluent_relevance
    - independently_verified_environmental_or_health_concern
    - meaningful_selective_adsorption_problem
    - falsifiable_biomimetic_design_opportunity
  priority_verification_group:
    - PFOA
    - PFBS
    - roxithromycin
    - bisphenol A
    - 2,6-dichlorophenol
  prohibited_shortcuts:
    - rank_by_paper_count_or_knowledge_item_count
    - treat_database_text_as_independently_verified_risk_evidence
    - admit_nutrients_or_inorganic_pollutants_without_explicit_scope_reopening

funnel:
  source_pollutants: 20
  scheme_portfolio: 10
  recommended_schemes: 5
  deep_concepts: 5
  finalists: 2
  primary: 1
  backup: 1

pollutant_scoring:
  applies_only_after_all_admission_gates_pass: true
  environmental_significance_is_weighted: false
  selective_challenge: 25
  uniquely_biomimetic_capability: 25
  mechanism_to_material_translatability: 20
  engineering_generality: 15
  novelty_and_evidence_opportunity: 15

final_scoring:
  causal_closure: 20
  selective_adsorption_mechanism: 25
  artificial_material_translatability: 20
  originality: 15
  experimental_falsifiability_and_controls: 10
  evidence_integrity: 10
  pass_score: 85
  unresolved_critical_allowed: 0
  unresolved_high_allowed: 0

hard_correspondence:
  required_static: 1
  required_dynamic: 0
  dynamic_is_optional_and_must_add_selective_function: true
  required_fields:
    - biological_feature
    - source_support
    - material_realization
    - expected_function
    - measurement
    - causal_control

biomimetic_classification:
  required_for_every_concept: true
  classes:
    functional_biomimicry: biological_system_solves_an_analogous_natural_function_with_direct_evidence
    biological_mechanism_informed: direct_biological_binding_or_structure_constrains_design_but_is_not_a_natural_pollution_solution
    rational_chemical_design: no_supported_biological_hard_correspondence
  rational_design_cannot_be_retrofitted_with_generic_protein_analogy: true
  engineering_problem_statement_precedes_prototype_retrieval: true
  minimum_hard_correspondences: 1
  second_hard_correspondence_is_bonus_not_gate: true
  dynamic_correspondence_remains_optional: true

material_translation:
  default_material_class: synthetic_nonbiological_adsorbent
  terminology_policy:
    biological_evidence_source: biological_prototype_or_exact_biological_category
    synthetic_recognition_term_zh: 人工识别单元
    unvalidated_synthetic_term_zh: 候选人工识别单元
    validated_synthetic_term_zh: 已验证人工识别单元
    prohibit_unqualified_receptor_for_synthetic_elements: true
    historical_artifacts_are_not_bulk_rewritten: true
  carrier_class: not_preselected
  carrier_mass_efficiency:
    principle: minimize_inactive_mass_without_sacrificing_selectivity_or_operability
    eligible_examples:
      - activated_or_engineered_porous_carbon
      - porous_polymer
      - inorganic_porous_support
      - self_supporting_porous_adsorbent
    no_example_is_mandatory: true
    required_reporting_basis:
      - mg_target_per_g_total_dry_composite
      - mg_target_per_mL_packed_bed
      - mmol_accessible_sites_per_g_total_dry_composite
      - receptor_mass_fraction_and_site_utilization
      - blank_carrier_uptake_under_matching_conditions
    rejection_rule: reject_if_inactive_mass_penalty_is_not_compensated_by_selectivity_matrix_tolerance_regeneration_stability_or_bed_performance
  biological_source_role: prototype_discovery_and_mechanism_evidence
  organ_enrichment_role: discovery_signal_not_causal_proof
  organ_enrichment_heuristic:
    status: optional_non_scoring_reference
    purpose: discover_candidate_binding_partitioning_or_transport_mechanisms
    required_before_material_translation:
      - reproducible_tissue_or_organ_enrichment
      - toxicokinetic_and_nonspecific_partitioning_alternatives_considered
      - direct_molecular_or_microenvironment_mechanism_evidence
    active_route_or_next_action_unchanged: true
  protein_peptide_or_biohybrid_requires_explicit_owner_scope_reopening: true
  prohibited_shortcuts:
    - introduce_protein_or_folded_peptide_only_to_satisfy_dynamic_correspondence
    - copy_protein_architecture_without_a_manufacturing_or_selectivity_necessity
    - infer_responsible_protein_from_tissue_enrichment_alone
    - treat_capacity_gain_as_selectivity_or_biomimetic_causality
    - preselect_carrier_only_for_coupling_convenience
    - report_capacity_only_per_receptor_or_active_fraction
    - ignore_inert_carrier_mass_in_gravimetric_comparisons

bmdl_gate:
  baseline_must_be_frozen_first: true
  design_assist:
    minimum_pairwise_wins: 6
    minimum_mean_gain: 5
    maximum_originality_drop: 2
    maximum_severe_misleading_links: 1
  exclude_from_design:
    diversity_ratio_below: 0.80
    severe_misleading_links_at_least: 2

adversarial_process:
  isolated_roles: true
  required_rounds_all_concepts: 2
  final_review_rounds_top_two: 1
  persist_hidden_reasoning: false
